name: AI RSS → 邮件推送

on:
  schedule:
    # UTC 0/12 = CST 8/20
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: 安装依赖
        run: npm ci
      - name: 抓取 RSS 并发送邮件
        run: node scripts/rss-to-email.mjs
        env:
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_PASS: ${{ secrets.QQ_SMTP_PASS }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
